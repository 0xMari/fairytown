<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Fairytown</title>
    <meta
      name="description"
      content="Procedural fairy world starter with placeholder biomes and flying controls."
    />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div class="entry-screen" id="entry-screen">
      <div class="entry-screen__card">
        <p class="entry-screen__eyebrow">Fairy Flight</p>
        <h1 class="entry-screen__title">Fairytown</h1>
        <p class="entry-screen__body">
          Drift through the procedural world and explore the biomes from a fairy's point of view.
        </p>
        <div class="entry-screen__controls" aria-label="Navigation commands">
          <p><span>Move</span> WASD</p>
          <p><span>Rise</span> Space</p>
          <p><span>Drop</span> C</p>
          <p><span>Boost</span> Shift</p>
          <p><span>Look</span> Mouse</p>
        </div>
        <p class="entry-screen__status" id="entry-status">Loading world... 0%</p>
        <button
          type="button"
          class="entry-screen__button"
          id="enter-world-button"
          disabled
        >
          Enter
        </button>
      </div>
    </div>

    <div class="crosshair is-hidden" id="crosshair" aria-hidden="true"></div>
